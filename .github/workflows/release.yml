name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  validate:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RUSTC_WRAPPER: ""
        run: |
          crate_version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "nucleus-container") | .version')"
          test "v${crate_version}" = "${RELEASE_TAG}"

      - name: Validate locked package
        env:
          RUSTC_WRAPPER: ""
        run: cargo package --locked

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup override set stable

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          RUSTC_WRAPPER: ""
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        run: |
          dir="nucleus-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/nucleus" "$dir/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$dir/"
          tar czf "nucleus-${{ matrix.target }}.tar.gz" "$dir"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "nucleus-${{ matrix.target }}.tar.gz" --clobber

  publish:
    needs:
      - validate
      - build
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable

      - run: cargo publish --locked
        env:
          RUSTC_WRAPPER: ""
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
