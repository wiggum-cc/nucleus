CONSTANTS
    Containers = {"c1", "c2"}
    Users = {"root", "alice", "bob"}
    Paths = {"/bin", "/usr", "/lib", "/lib64", "/context", "/tmp", "/etc", "/proc", "/dev", "/host_secret"}
    AllowedMountPaths = {"/bin", "/usr", "/lib", "/lib64", "/context", "/tmp", "/etc", "/proc", "/dev"}
    Signals = {"SIGTERM", "SIGKILL", "SIGINT"}

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT RunningRequiresIsolation
INVARIANT RunningRequiresSecurity
INVARIANT LockedImpliesAllControls
INVARIANT RemovedRequiresCleanup
INVARIANT MountedPathsRestricted
INVARIANT AuthorizationGrantedOnlyForOwnerOrRoot
INVARIANT AuthorizationDeniedOnlyForUnauthorized
INVARIANT NoExecWithoutFreshPid

PROPERTY NoBackwardLifecycle
PROPERTY NoBackwardSecurity
PROPERTY AllStartsEventuallySettle
PROPERTY AllStopsEventuallySettle
PROPERTY AllCleanupEventuallyRemoves
